<body>

        <nav>

  <div class="container contato">
    <h1>Contato</h1>

    <!-- Link de e-mail -->
    <a class="email-link" href="mailto:seuemail@exemplo.com">
      Clique aqui para enviar um e-mail
    </a>

    <!-- Formulário -->
    <form id="formContato">
      
      <label for="email">Seu e-mail:</label>
      <input type="email" id="email" placeholder="Digite seu e-mail">
      <div class="erro" id="erroEmail"></div>

      <label for="mensagem">Mensagem (você gostou do site?):</label>
      <textarea id="mensagem" rows="5" placeholder="Escreva sua opinião"></textarea>
      <div class="erro" id="erroMensagem"></div>

      <button type="submit">Enviar</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("formContato");

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      let email = document.getElementById("email").value.trim();
      let mensagem = document.getElementById("mensagem").value.trim();

      let erroEmail = document.getElementById("erroEmail");
      let erroMensagem = document.getElementById("erroMensagem");

      erroEmail.textContent = "";
      erroMensagem.textContent = "";

      let valido = true;

      // valida e-mail simples
      let regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!regexEmail.test(email)) {
        erroEmail.textContent = "Digite um e-mail válido.";
        valido = false;
      }

      if (mensagem.length < 5) {
        erroMensagem.textContent = "A mensagem deve ter pelo menos 5 caracteres.";
        valido = false;
      }

      if (valido) {
        alert("Formulário enviado com sucesso!");
        form.reset();
      }
    });
  </script>
  <script><!--cria um script que tira e retira a barra de navegação---->
        function mostrarmenu() {document.querySelector("header nav").classList.toggle("mostrar")}
    </script>

</body>
